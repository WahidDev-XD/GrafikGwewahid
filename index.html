<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Arknights Full Operator Database</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:
  radial-gradient(circle at top,#1e293b,#020617 75%);
  color:white;
  min-height:100vh;
  overflow-x:hidden;
}

header{
  padding:35px 20px;
  text-align:center;
}

.title{
  font-size:42px;
  font-weight:700;
  background:
  linear-gradient(90deg,#60a5fa,#a855f7);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.sub{
  margin-top:10px;
  opacity:0.7;
}

.controls{
  width:100%;
  max-width:1400px;
  margin:auto;
  display:flex;
  gap:15px;
  padding:20px;
  flex-wrap:wrap;
}

.search-box{
  flex:1;
  min-width:250px;
}

.search-box input{
  width:100%;
  padding:16px;
  border:none;
  border-radius:18px;
  outline:none;
  background:rgba(255,255,255,0.06);
  color:white;
  font-size:15px;
  border:1px solid rgba(255,255,255,0.08);
}

.filter{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.filter button{
  padding:14px 18px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  background:rgba(255,255,255,0.06);
  color:white;
  font-weight:600;
  transition:0.25s;
}

.filter button:hover{
  background:#2563eb;
  transform:translateY(-2px);
}

.filter button.active{
  background:
  linear-gradient(135deg,#2563eb,#7c3aed);
}

.grid{
  width:100%;
  max-width:1500px;
  margin:auto;
  display:grid;
  grid-template-columns:
  repeat(auto-fit,minmax(260px,1fr));
  gap:24px;
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:24px;
  overflow:hidden;
  transition:0.3s;
  backdrop-filter:blur(10px);
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:
  0 18px 35px rgba(0,0,0,0.45);
}

.card img{
  width:100%;
  height:340px;
  object-fit:cover;
}

.content{
  padding:18px;
}

.name{
  font-size:22px;
  font-weight:700;
}

.role{
  margin-top:6px;
  opacity:0.75;
}

.rarity{
  margin-top:14px;
  display:inline-block;
  padding:8px 14px;
  border-radius:12px;
  background:
  linear-gradient(135deg,#f59e0b,#ef4444);
  font-size:13px;
  font-weight:600;
}

footer{
  text-align:center;
  padding:40px 20px;
  opacity:0.7;
}

@media(max-width:700px){

  .title{
    font-size:32px;
  }

  .card img{
    height:300px;
  }

}

</style>
</head>
<body>

<header>

  <div class="title">
    ARKNIGHTS DATABASE
  </div>

  <div class="sub">
    Full Operator List ★1 - ★6
  </div>

</header>

<div class="controls">

  <div class="search-box">
    <input
      type="text"
      id="search"
      placeholder="Cari operator..."
    >
  </div>

  <div class="filter">

    <button class="active"
    onclick="filterRarity('all',this)">
      Semua
    </button>

    <button onclick="filterRarity('6',this)">
      ★★★★★★
    </button>

    <button onclick="filterRarity('5',this)">
      ★★★★★
    </button>

    <button onclick="filterRarity('4',this)">
      ★★★★
    </button>

    <button onclick="filterRarity('3',this)">
      ★★★
    </button>

    <button onclick="filterRarity('2',this)">
      ★★
    </button>

    <button onclick="filterRarity('1',this)">
      ★
    </button>

  </div>

</div>

<div class="grid" id="grid"></div>

<footer>
  Arknights Full Character Database
</footer>

const grid =
document.getElementById("grid");

function renderCards(data){

grid.innerHTML = "";

data.forEach(op=>{

grid.innerHTML += `

<div class="card">

<img src="${op.image}" alt="${op.name}">

<div class="content">

<div class="name">
${op.name}
</div>

<div class="role">
${op.role}
</div>

<div class="rarity">
${"★".repeat(op.rarity)}
</div>

</div>

</div>

`;

});

}

renderCards(operators);

function filterRarity(rarity,btn){

document
.querySelectorAll(".filter button")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

if(rarity === "all"){

renderCards(operators);

}else{

const filtered =
operators.filter(op=>
op.rarity === rarity
);

renderCards(filtered);

}

}

document
.getElementById("search")
.addEventListener("input",function(){

const value =
this.value.toLowerCase();

const filtered =
operators.filter(op=>

op.name.toLowerCase()
.includes(value)

);

renderCards(filtered);

});
