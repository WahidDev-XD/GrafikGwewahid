<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Crypto Live Chart</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      min-height:100vh;
      overflow-x:hidden;
    }

    .container{
      width:100%;
      max-width:1200px;
      margin:auto;
      padding:20px;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:15px;
      margin-bottom:20px;
    }

    .title{
      font-size:32px;
      font-weight:700;
      background:linear-gradient(90deg,#38bdf8,#818cf8);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .idr-box{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      padding:14px 20px;
      border-radius:18px;
      backdrop-filter:blur(10px);
      font-size:18px;
      font-weight:600;
      box-shadow:0 8px 30px rgba(0,0,0,0.3);
    }

    .button-group{
      display:flex;
      gap:15px;
      flex-wrap:wrap;
      margin-bottom:25px;
    }

    .coin-btn{
      border:none;
      padding:14px 22px;
      border-radius:16px;
      cursor:pointer;
      font-size:15px;
      font-weight:600;
      color:white;
      background:rgba(255,255,255,0.06);
      transition:0.3s;
      border:1px solid rgba(255,255,255,0.08);
    }

    .coin-btn:hover{
      transform:translateY(-3px);
      background:#2563eb;
    }

    .coin-btn.active{
      background:linear-gradient(135deg,#2563eb,#7c3aed);
      box-shadow:0 8px 20px rgba(37,99,235,0.4);
    }

    .chart-box{
      width:100%;
      height:650px;
      background:rgba(255,255,255,0.04);
      border-radius:25px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:0 10px 40px rgba(0,0,0,0.35);
    }

    .footer{
      text-align:center;
      margin-top:25px;
      opacity:0.7;
      font-size:14px;
    }

    @media(max-width:768px){

      .title{
        font-size:24px;
      }

      .chart-box{
        height:500px;
      }

      .coin-btn{
        flex:1;
        text-align:center;
      }

    }
  </style>
</head>
<body>

  <div class="container">

    <div class="top">

      <div class="title">
        LIVE CRYPTO CHART
      </div>

      <div class="idr-box" id="idrPrice">
        Loading IDR...
      </div>

    </div>

    <div class="button-group">
      <button class="coin-btn active" onclick="changeChart('BINANCE:BTCUSDT', this)">
        Bitcoin
      </button>

      <button class="coin-btn" onclick="changeChart('BINANCE:ETHUSDT', this)">
        Ethereum
      </button>

      <button class="coin-btn" onclick="changeChart('BINANCE:SOLUSDT', this)">
        Solana
      </button>

      <button class="coin-btn" onclick="showIDRChart(this)">
        USD / IDR
      </button>
    </div>

    <div class="chart-box">
      <div id="tradingview_chart" style="height:100%; width:100%;"></div>
    </div>

    <div class="footer">
      Real-Time Market • Modern UI • GitHub Pages Ready
    </div>

  </div>

  <script src="https://s3.tradingview.com/tv.js"></script>

  <script>
    let currentWidget;

    function loadChart(symbol){

      document.getElementById("tradingview_chart").innerHTML = "";

      currentWidget = new TradingView.widget({
        autosize: true,
        symbol: symbol,
        interval: "15",
        timezone: "Asia/Jakarta",
        theme: "dark",
        style: "1",
        locale: "id",
        toolbar_bg: "#0f172a",
        enable_publishing: false,
        hide_side_toolbar: false,
        allow_symbol_change: true,
        container_id: "tradingview_chart"
      });

    }

    function changeChart(symbol, element){

      document.querySelectorAll(".coin-btn")
      .forEach(btn => btn.classList.remove("active"));

      element.classList.add("active");

      loadChart(symbol);

    }

    function showIDRChart(element){

      document.querySelectorAll(".coin-btn")
      .forEach(btn => btn.classList.remove("active"));

      element.classList.add("active");

      loadChart("FX_IDC:USDIDR");

    }

    async function getUSDIDR(){

      try{

        const response = await fetch(
          "https://open.er-api.com/v6/latest/USD"
        );

        const data = await response.json();

        const rate = data.rates.IDR;

        document.getElementById("idrPrice").innerHTML =
          `1$ / ${rate.toLocaleString("id-ID")} IDR`;

      }catch(err){

        document.getElementById("idrPrice").innerHTML =
          "Gagal memuat IDR";

      }

    }

    loadChart("BINANCE:BTCUSDT");

    getUSDIDR();

    setInterval(getUSDIDR, 10000);
  </script>

</body>
</html>
