<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Modern Chess AI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:
      radial-gradient(circle at top left,#1e3a8a,#020617 60%);
      min-height:100vh;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:1200px;
      display:grid;
      grid-template-columns: 1fr 350px;
      gap:25px;
    }

    .board-box{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:28px;
      padding:20px;
      backdrop-filter:blur(15px);
      box-shadow:0 15px 40px rgba(0,0,0,0.4);
    }

    .title{
      font-size:34px;
      font-weight:700;
      margin-bottom:20px;
      background:linear-gradient(90deg,#60a5fa,#818cf8);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    #board{
      width:100%;
      max-width:720px;
      margin:auto;
    }

    .side{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:28px;
      padding:25px;
      backdrop-filter:blur(15px);
      box-shadow:0 15px 40px rgba(0,0,0,0.4);
      height:fit-content;
    }

    .status{
      font-size:18px;
      font-weight:600;
      margin-bottom:20px;
      line-height:1.6;
    }

    .btn{
      width:100%;
      padding:15px;
      border:none;
      border-radius:16px;
      background:linear-gradient(135deg,#2563eb,#7c3aed);
      color:white;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
      margin-bottom:15px;
    }

    .btn:hover{
      transform:translateY(-3px);
      box-shadow:0 10px 25px rgba(37,99,235,0.4);
    }

    .info{
      opacity:0.8;
      font-size:14px;
      line-height:1.8;
    }

    .move-list{
      margin-top:20px;
      background:rgba(255,255,255,0.04);
      border-radius:18px;
      padding:15px;
      max-height:300px;
      overflow-y:auto;
    }

    .move{
      padding:8px 10px;
      border-bottom:1px solid rgba(255,255,255,0.06);
      font-size:14px;
    }

    @media(max-width:980px){

      .container{
        grid-template-columns:1fr;
      }

      .side{
        order:-1;
      }

    }
  </style>

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard-1.0.0.min.css"/>

</head>
<body>

<div class="container">

  <div class="board-box">

    <div class="title">
      CHESS AI
    </div>

    <div id="board"></div>

  </div>

  <div class="side">

    <div class="status" id="status">
      Status: Giliran Putih
    </div>

    <button class="btn" onclick="resetGame()">
      Restart Game
    </button>

    <button class="btn" onclick="undoMove()">
      Undo Move
    </button>

    <div class="info">
      ♟ Lawan bermain menggunakan AI computer.<br><br>
      ♟ Kamu bermain sebagai putih.<br><br>
      ♟ Klik lalu pindahkan bidak untuk bermain.
    </div>

    <div class="move-list" id="moveList"></div>

  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard-1.0.0.min.js"></script>

<script>

  const game = new Chess();

  let board;

  const moveList = document.getElementById("moveList");
  const statusDiv = document.getElementById("status");

  function updateStatus(){

    let status = "";

    if(game.in_checkmate()){

      status = "Checkmate!";

    }else if(game.in_draw()){

      status = "Draw!";

    }else{

      status =
      game.turn() === 'w'
      ? "Giliran Putih"
      : "Computer berpikir...";

      if(game.in_check()){

        status += " — CHECK!";
      }
    }

    statusDiv.innerHTML = "Status: " + status;

    updateMoveHistory();
  }

  function updateMoveHistory(){

    const history = game.history();

    moveList.innerHTML = "";

    history.forEach((move,index)=>{

      const div = document.createElement("div");

      div.className = "move";

      div.innerHTML =
      `${index + 1}. ${move}`;

      moveList.appendChild(div);

    });

    moveList.scrollTop = moveList.scrollHeight;
  }

  function minimaxRoot(depth, game, isMaximisingPlayer){

    const newGameMoves = game.moves();

    let bestMove = -9999;
    let bestMoveFound;

    for(let i = 0; i < newGameMoves.length; i++){

      const newGameMove = newGameMoves[i];

      game.move(newGameMove);

      const value =
      minimax(depth - 1, game, -10000, 10000, !isMaximisingPlayer);

      game.undo();

      if(value >= bestMove){

        bestMove = value;
        bestMoveFound = newGameMove;
      }
    }

    return bestMoveFound;
  }

  function minimax(depth, game, alpha, beta, isMaximisingPlayer){

    if(depth === 0){

      return -evaluateBoard(game.board());
    }

    const newGameMoves = game.moves();

    if(isMaximisingPlayer){

      let bestMove = -9999;

      for(let i = 0; i < newGameMoves.length; i++){

        game.move(newGameMoves[i]);

        bestMove = Math.max(
          bestMove,
          minimax(depth - 1, game, alpha, beta, false)
        );

        game.undo();

        alpha = Math.max(alpha, bestMove);

        if(beta <= alpha){

          return bestMove;
        }
      }

      return bestMove;

    }else{

      let bestMove = 9999;

      for(let i = 0; i < newGameMoves.length; i++){

        game.move(newGameMoves[i]);

        bestMove = Math.min(
          bestMove,
          minimax(depth - 1, game, alpha, beta, true)
        );

        game.undo();

        beta = Math.min(beta, bestMove);

        if(beta <= alpha){

          return bestMove;
        }
      }

      return bestMove;
    }
  }

  function evaluateBoard(board){

    let totalEvaluation = 0;

    for(let i = 0; i < 8; i++){

      for(let j = 0; j < 8; j++){

        totalEvaluation =
        totalEvaluation +
        getPieceValue(board[i][j]);
      }
    }

    return totalEvaluation;
  }

  function getPieceValue(piece){

    if(piece === null){

      return 0;
    }

    const values = {
      p:10,
      n:30,
      b:30,
      r:50,
      q:90,
      k:900
    };

    let value = values[piece.type];

    return piece.color === 'w' ? value : -value;
  }

  function makeBestMove(){

    if(game.game_over()) return;

    const bestMove =
    minimaxRoot(2, game, true);

    game.move(bestMove);

    board.position(game.fen());

    updateStatus();
  }

  function onDragStart(source, piece){

    if(game.game_over()) return false;

    if(piece.search(/^b/) !== -1) return false;

    if(game.turn() !== 'w') return false;
  }

  function onDrop(source, target){

    const move = game.move({
      from: source,
      to: target,
      promotion: 'q'
    });

    if(move === null){

      return 'snapback';
    }

    updateStatus();

    window.setTimeout(function(){

      makeBestMove();

    }, 300);
  }

  function onSnapEnd(){

    board.position(game.fen());
  }

  function resetGame(){

    game.reset();

    board.start();

    updateStatus();
  }

  function undoMove(){

    game.undo();
    game.undo();

    board.position(game.fen());

    updateStatus();
  }

  board = Chessboard('board',{

    draggable:true,
    position:'start',

    onDragStart:onDragStart,
    onDrop:onDrop,
    onSnapEnd:onSnapEnd

  });

  updateStatus();

</script>

</body>
</html>
